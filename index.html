<html lang="zh-CN">
<head><meta content="default-src 'none'; style-src * 'unsafe-inline'; script-src * 'unsafe-inline'; img-src * data: blob:; font-src * data:; media-src * data: blob:; connect-src 'none'; form-action 'none'; frame-src 'none'; object-src 'none'; base-uri 'none'" http-equiv="Content-Security-Policy"/>

<title>转底炉耐材点检数据录入系统</title>
<script src="https://image.uc.cn/s/uae/g/3n/mos-production/0915/3.4.17.js"></script>
<script src="https://image.uc.cn/s/uae/g/3n/mos-production/fontawesome-free-7.1.0-web/js/all.min.js"></script>

<style>
        /* Custom Styles for Roller Effect */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f3f4f6;
            overflow: hidden; /* Prevent body scroll, handle inside app */
        }
        
        .roller-container {
            height: 300px;
            overflow: hidden;
            position: relative;
            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
        }

        .roller-list {
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
        }

        .roller-item {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.3;
            transform: scale(0.9);
            transition: all 0.5s ease;
            text-align: center;
            padding: 0 20px;
        }

        .roller-item.active {
            opacity: 1;
            transform: scale(1.1);
            font-weight: bold;
            color: #2563eb;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 50;
            left: 50%;
            top: 30px;
            transform: translateX(-50%);
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s, top 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            top: 50px;
        }

        /* Hide Scrollbar */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* Media Preview */
        .media-preview {
            max-width: 100px;
            max-height: 100px;
            object-fit: cover;
            margin-top: 5px;
            border-radius: 4px;
        }

        /* 移动端适配优化 */
        @media (max-width: 768px) {
            /* 确保底部有足够空间，避免按钮被遮挡 */
            #app {
                padding-bottom: env(safe-area-inset-bottom, 20px);
            }
            
            /* 输入区域优化 */
            input, textarea {
                font-size: 16px !important; /* 防止iOS缩放 */
            }
            
            /* 备注文本框移动端优化 */
            #inputRemark {
                min-height: 80px;
            }
            
            /* 确保顶部按钮不被遮挡 */
            header {
                padding-top: max(1rem, env(safe-area-inset-top, 1rem));
            }
            
            /* 底部附件区域增加间距 */
            .mb-4:last-of-type {
                margin-bottom: 2rem !important;
            }
        }

        /* 防止iOS橡皮筋效果导致的布局问题 */
        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* 确保textarea可以正常滚动 */
        textarea {
            touch-action: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col text-gray-800" style="padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);">
<div id="toast">提示信息</div>
<div class="flex-1 flex flex-col relative h-full" id="app">
</div>
<div id="chart-container" style="width: 400px; height: 200px; position: absolute; top: -9999px; left: -9999px;"></div>
<script>
        // --- Data Definitions ---
        const FURNACE_1_ITEMS = [
            { id: '1-1', device: '1#转底炉', area: '还原三区', pos: '炉墙（外）', name: '表面开裂、冒火及温度检查' },
            { id: '1-2', device: '1#转底炉', area: '还原二区', pos: '炉墙（外）', name: '表面开裂、冒火及温度检查' },
            { id: '1-3', device: '1#转底炉', area: '还原一区', pos: '炉墙（外）', name: '表面开裂、冒火及温度检查' },
            { id: '1-4', device: '1#转底炉', area: '加热区', pos: '炉墙（外）', name: '表面开裂、冒火及温度检查' },
            { id: '1-5', device: '1#沉降室及烟道', area: '烟道', pos: '水平段（侧）', name: '表面开裂、冒火及温度检查' },
            { id: '1-6', device: '1#沉降室及烟道', area: '沉降室筒体', pos: '中部', name: '表面开裂、冒火及温度检查' },
            { id: '1-7', device: '1#沉降室及烟道', area: '沉降室筒体', pos: '上半部', name: '表面开裂、冒火及温度检查' },
            { id: '1-8', device: '1#沉降室及烟道', area: '烟道', pos: '90°弯管', name: '表面开裂、冒火及温度检查' },
            { id: '1-9', device: '1#转底炉', area: '加热区', pos: '炉顶', name: '表面开裂、冒火及温度检查' },
            { id: '1-10', device: '1#转底炉', area: '还原一区', pos: '炉顶', name: '表面开裂、冒火及温度检查' },
            { id: '1-11', device: '1#转底炉', area: '还原二区', pos: '炉顶', name: '表面开裂、冒火及温度检查' },
            { id: '1-12', device: '1#转底炉', area: '还原三区', pos: '炉顶', name: '表面开裂、冒火及温度检查' },
            { id: '1-13', device: '1#转底炉', area: '还原三区', pos: '炉墙（内）', name: '锚固砖断裂及吊挂钩脱落检查' },
            { id: '1-14', device: '1#转底炉', area: '还原二区', pos: '炉墙（内）', name: '锚固砖断裂及吊挂钩脱落检查' },
            { id: '1-15', device: '1#转底炉', area: '还原一区', pos: '炉墙（内）', name: '锚固砖断裂及吊挂钩脱落检查' },
            { id: '1-16', device: '1#转底炉', area: '加热区', pos: '炉墙（内）', name: '锚固砖断裂及吊挂钩脱落检查' },
            { id: '1-17', device: '1#沉降室及烟道', area: '沉降室筒体', pos: '锥体部', name: '锚固砖断裂及吊挂钩脱落检查' }
        ];

        const FURNACE_2_ITEMS = [
            { id: '2-1', device: '2#转底炉', area: '加热区', pos: '炉墙（外）', name: '表面开裂、冒火及温度检查' },
            { id: '2-2', device: '2#转底炉', area: '还原一区', pos: '炉墙（外）', name: '表面开裂、冒火及温度检查' },
            { id: '2-3', device: '2#转底炉', area: '还原二区', pos: '炉墙（外）', name: '表面开裂、冒火及温度检查' },
            { id: '2-4', device: '2#转底炉', area: '还原三区', pos: '炉墙（外）', name: '表面开裂、冒火及温度检查' },
            { id: '2-5', device: '2#转底炉', area: '还原三区', pos: '炉顶', name: '表面开裂、冒火及温度检查' },
            { id: '2-6', device: '2#转底炉', area: '还原二区', pos: '炉顶', name: '表面开裂、冒火及温度检查' },
            { id: '2-7', device: '2#转底炉', area: '还原一区', pos: '炉顶', name: '表面开裂、冒火及温度检查' },
            { id: '2-8', device: '2#转底炉', area: '加热区', pos: '炉顶', name: '表面开裂、冒火及温度检查' },
            { id: '2-9', device: '2#沉降室及烟道', area: '烟道', pos: '上升烟道', name: '表面开裂、冒火及温度检查' },
            { id: '2-10', device: '2#沉降室及烟道', area: '烟道', pos: '水平段（侧）', name: '表面开裂、冒火及温度检查' },
            { id: '2-11', device: '2#沉降室及烟道', area: '沉降室筒体', pos: '中部', name: '表面开裂、冒火及温度检查' },
            { id: '2-12', device: '2#沉降室及烟道', area: '沉降室筒体', pos: '上半部', name: '表面开裂、冒火及温度检查' },
            { id: '2-13', device: '2#转底炉', area: '还原三区', pos: '炉墙（内）', name: '锚固砖断裂及吊挂钩脱落检查' },
            { id: '2-14', device: '2#转底炉', area: '还原二区', pos: '炉墙（内）', name: '锚固砖断裂及吊挂钩脱落检查' },
            { id: '2-15', device: '2#转底炉', area: '还原一区', pos: '炉墙（内）', name: '锚固砖断裂及吊挂钩脱落检查' },
            { id: '2-16', device: '2#转底炉', area: '加热区', pos: '炉墙（内）', name: '锚固砖断裂及吊挂钩脱落检查' },
            { id: '2-17', device: '2#沉降室及烟道', area: '沉降室筒体', pos: '锥体部', name: '锚固砖断裂及吊挂钩脱落检查' }
        ];

        // --- State Management ---
        const state = {
            currentView: 'select', // select, inspection, export
            furnaceId: null,
            items: [],
            currentIndex: 0,
            formData: {}, // Key: itemId, Value: { max, avg, desc, mediaFiles[] }
            history: [], // Loaded from localStorage
            startY: 0,
            startTime: 0,
            isScrolling: false,
            remark: '' // 全局备注
        };

        // --- Core Functions ---

        function init() {
            loadHistory();
            // 恢复未完成的点检数据
            restoreDraftData();
            renderSelectView();
            
            // 添加触摸事件监听器
            const app = document.getElementById('app');
            app.addEventListener('touchstart', handleTouchStart, { passive: false });
            app.addEventListener('touchmove', handleTouchMove, { passive: false });
            app.addEventListener('touchend', handleTouchEnd, { passive: false });
        }

        function loadHistory() {
            const stored = localStorage.getItem('rhf_inspection_history');
            if (stored) {
                state.history = JSON.parse(stored);
            }
        }

        function saveHistory() {
            // In a real app, we might save after every item or at the end.
            // Here we save the current session data to history upon export completion.
            localStorage.setItem('rhf_inspection_history', JSON.stringify(state.history));
        }

        // 保存草稿数据到localStorage（实时保存）
        function saveDraftData() {
            const draftData = {
                formData: state.formData,
                remark: state.remark,
                timestamp: Date.now()
            };
            localStorage.setItem('rhf_inspection_draft', JSON.stringify(draftData));
        }

        // 从localStorage恢复草稿数据
        function restoreDraftData() {
            const draftStr = localStorage.getItem('rhf_inspection_draft');
            if (draftStr) {
                try {
                    const draft = JSON.parse(draftStr);
                    if (draft.formData) {
                        state.formData = draft.formData;
                    }
                    if (draft.remark !== undefined) {
                        state.remark = draft.remark;
                    }
                } catch (e) {
                    console.error('恢复草稿数据失败:', e);
                }
            }
        }

        // 清除草稿数据
        function clearDraftData() {
            localStorage.removeItem('rhf_inspection_draft');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'show';
            setTimeout(() => { toast.className = toast.className.replace('show', ''); }, 3000);
        }

        // --- Touch Handling Functions for Mobile Scrolling ---
        function handleTouchStart(e) {
            if (state.currentView !== 'inspection') return;
            
            // 排除textarea区域的触摸事件
            if (e.target.tagName === 'TEXTAREA' || e.target.closest('textarea')) {
                return;
            }
            
            state.startY = e.touches[0].clientY;
            state.startTime = new Date().getTime();
            state.isScrolling = true;
        }

        function handleTouchMove(e) {
            if (!state.isScrolling || state.currentView !== 'inspection') return;
            
            // 排除textarea区域的触摸事件
            if (e.target.tagName === 'TEXTAREA' || e.target.closest('textarea')) {
                return;
            }
            
            const currentY = e.touches[0].clientY;
            const diffY = state.startY - currentY; // Negative means scrolling down, positive means up
            
            // 防止默认滚动行为
            e.preventDefault();
        }

        function handleTouchEnd(e) {
            if (!state.isScrolling || state.currentView !== 'inspection') return;
            
            // 排除textarea区域的触摸事件
            if (e.target.tagName === 'TEXTAREA' || e.target.closest('textarea')) {
                return;
            }
            
            const endY = e.changedTouches[0].clientY;
            const diffY = state.startY - endY;
            const endTime = new Date().getTime();
            const timeDiff = endTime - state.startTime;
            
            // 计算滑动速度和距离
            const speed = Math.abs(diffY) / timeDiff;
            
            // 使用非线性函数计算跳过的行数 (距离越远，跳得越多)
            // 使用平方函数实现先慢后快的效果
            const distanceFactor = Math.pow(Math.abs(diffY) / 100, 2);
            const calculatedSteps = Math.round(distanceFactor * 3); // 最大跳跃3行
            
            // 至少移动1行
            const steps = Math.max(1, calculatedSteps);
            
            if (diffY > 50) { // 向上滑动，跳转到下一个项目
                for (let i = 0; i < steps; i++) {
                    nextItem();
                }
            } else if (diffY < -50) { // 向下滑动，跳转到上一个项目
                for (let i = 0; i < steps; i++) {
                    prevItem();
                }
            }
            
            state.isScrolling = false;
        }

        // --- View Rendering ---

        function renderSelectView() {
            state.currentView = 'select';
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center bg-gray-100 p-6">
                    <h1 class="text-2xl font-bold text-gray-800 mb-4">转底炉耐材点检系统</h1>
                    <p class="text-gray-500 mb-8">1#、2#转底炉同时点检，数据一并录入</p>
                    <div class="w-full max-w-md">
                        <button onclick="startInspection()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-12 rounded-xl shadow-lg transition transform hover:scale-105 flex flex-col items-center justify-center w-full">
                            <span class="text-4xl mb-2"><i class="fa-solid fa-clipboard-check"></i></span>
                            <span class="text-xl">开始点检</span>
                            <span class="text-sm mt-1 opacity-80">1# + 2# 转底炉</span>
                        </button>
                    </div>
                </div>
            `;
        }

        function startInspection() {
            state.furnaceId = 'both';
            state.items = [...FURNACE_1_ITEMS, ...FURNACE_2_ITEMS];
            state.currentIndex = 0;
            state.formData = {}; // Reset form data
            renderInspectionView();
        }

        function renderInspectionView() {
            state.currentView = 'inspection';
            const app = document.getElementById('app');
            const currentItem = state.items[state.currentIndex];
            
            // Build Roller HTML
            let rollerHtml = '';
            state.items.forEach((item, index) => {
                const isActive = index === state.currentIndex;
                rollerHtml += `
                    <div class="roller-item ${isActive ? 'active' : ''}" onclick="goToItem(${index})">
                        <div class="truncate">
                            <span class="text-xs text-gray-500 block">${item.device} / ${item.area}</span>
                            <span class="text-sm">${item.pos}</span>
                        </div>
                    </div>
                `;
            });

            // Get current data
            const currentData = state.formData[currentItem.id] || { max: '', avg: '', desc: '', media: [] };
            
            // Media Preview HTML
            let mediaHtml = '';
            if (currentData.media && currentData.media.length > 0) {
                currentData.media.forEach(m => {
                    if(m.type.startsWith('image')) {
                        mediaHtml += `<img src="${m.url}" class="media-preview border border-gray-300">`;
                    } else {
                        mediaHtml += `<div class="flex items-center bg-gray-200 p-1 rounded text-xs"><i class="fa-solid fa-video mr-1"></i>视频文件</div>`;
                    }
                });
            }

            app.innerHTML = `
                <div class="flex-1 flex flex-col h-full bg-white relative">
                    <!-- Header -->
                    <header class="bg-blue-600 text-white p-4 shadow-md z-10">
                        <div class="flex justify-between items-center">
                            <h1 class="text-lg font-bold">${currentItem.device.includes('1#') ? '1#' : '2#'} 转底炉点检</h1>
                            <button onclick="renderExportView()" class="text-sm bg-blue-500 px-3 py-1 rounded hover:bg-blue-400">完成导出</button>
                        </div>
                        <div class="text-xs text-blue-200 mt-1">进度: ${state.currentIndex + 1} / ${state.items.length}</div>
                    </header>

                    <!-- Main Content -->
                    <main class="flex-1 flex flex-col overflow-hidden">
                        
                        <!-- Roller Section -->
                        <div class="roller-container bg-gray-50 flex-shrink-0">
                            <div class="roller-list" id="rollerList" style="transform: translateY(120px);">
                                ${rollerHtml}
                            </div>
                        </div>

                        <!-- Input Form Section -->
                        <div class="flex-1 overflow-y-auto p-4 border-t border-gray-200">
                            <div class="mb-4">
                                <h2 class="text-lg font-bold text-gray-800 mb-1">${currentItem.pos}</h2>
                                <p class="text-sm text-gray-500">项目: ${currentItem.name}</p>
                            </div>

                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">最高温度 (必填) <span class="text-red-500">*</span></label>
                                    <input type="number" id="inputMax" value="${currentData.max}" 
                                        class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                        placeholder="0">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">平均温度 (必填) <span class="text-red-500">*</span></label>
                                    <input type="number" id="inputAvg" value="${currentData.avg}" 
                                        class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                        placeholder="0">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">异常说明</label>
                                <textarea id="inputDesc" rows="3" 
                                    class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                    placeholder="请输入异常情况说明...">${currentData.desc}</textarea>
                            </div>

                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">添加附件 (图片/视频)</label>
                                <div class="flex items-center space-x-2">
                                    <label class="cursor-pointer bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded text-sm transition">
                                        <i class="fa-solid fa-camera mr-1"></i> 选择文件
                                        <input type="file" accept="image/*,video/*" class="hidden" onchange="handleMediaUpload(this)">
                                    </label>
                                </div>
                                <div id="mediaPreviewContainer" class="flex flex-wrap gap-2 mt-2">
                                    ${mediaHtml}
                                </div>
                            </div>

                            <!-- 备注区域 -->
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
                                <textarea id="inputRemark" rows="3" 
                                    class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                    placeholder="请输入备注信息...">${state.remark}</textarea>
                            </div>
                        </div>
                    </main>

                    <!-- Navigation Buttons -->
                    <div class="absolute inset-y-0 left-0 flex items-center px-2">
                        <button onclick="prevItem()" class="bg-gray-800 bg-opacity-50 hover:bg-opacity-70 text-white w-10 h-10 rounded-full flex items-center justify-center shadow backdrop-blur-sm">
                            <i class="fa-solid fa-chevron-up"></i>
                        </button>
                    </div>
                    <div class="absolute inset-y-0 right-0 flex items-center px-2">
                        <button onclick="nextItem()" class="bg-gray-800 bg-opacity-50 hover:bg-opacity-70 text-white w-10 h-10 rounded-full flex items-center justify-center shadow backdrop-blur-sm">
                            <i class="fa-solid fa-chevron-down"></i>
                        </button>
                    </div>
                </div>
            `;

            // Attach listeners for auto-save
            document.getElementById('inputMax').addEventListener('input', (e) => saveCurrentItem('max', e.target.value));

        // 根据device+area+pos匹配HTML录入数据到模板行
        // 先填充模板行中因合并单元格而留空的device和area
        function fillTemplateContext(templateRows) {
            var currentDevice = '';
            var currentArea = '';
            for (var i = 0; i < templateRows.length; i++) {
                var tRow = templateRows[i];
                if (tRow.device) currentDevice = tRow.device;
                if (tRow.area) currentArea = tRow.area;
                tRow._device = currentDevice;
                tRow._area = currentArea;
            }
        }

        function matchFormDataToTemplate(tRow) {
            var device = tRow._device || '';
            var area = tRow._area || '';
            var pos = tRow.pos || '';
            // 精确匹配：device+area+pos
            for (var i = 0; i < state.items.length; i++) {
                var item = state.items[i];
                if (item.device === device && item.area === area && item.pos === pos) {
                    return state.formData[item.id] || {};
                }
            }
            // 宽松匹配：area+pos（不同设备间区域+位置可能相同）
            for (var i = 0; i < state.items.length; i++) {
                var item = state.items[i];
                if (item.area === area && item.pos === pos) {
                    return state.formData[item.id] || {};
                }
            }
            // 最宽松匹配：只用pos
            for (var i = 0; i < state.items.length; i++) {
                var item = state.items[i];
                if (item.pos === pos) {
                    return state.formData[item.id] || {};
                }
            }
            return {};
        }

        // 构建异常说明文字内容（仅文字部分，图片单独嵌入）
        function buildDescText(data) {
            var parts = [];
            if (data.desc && data.desc.trim()) {
                parts.push(data.desc.trim());
            }
            if (data.media && data.media.length > 0) {
                var nonImageMedia = data.media.filter(function(m) { return !m.type.startsWith('image/'); });
                if (nonImageMedia.length > 0) {
                    var names = nonImageMedia.map(function(m) { return '[附件: ' + m.name + ']'; });
                    parts.push(names.join(', '));
                }
            }
            return parts.join('\n');
        }

        // 获取图片类附件列表
        function getImageMedia(data) {
            if (!data.media || data.media.length === 0) return [];
            return data.media.filter(function(m) {
                return m.type && m.type.startsWith('image/') && m.base64;
            });
        }

        // 异步获取图片尺寸（保持纵横比）
        function getImageSize(base64DataUrl) {
            return new Promise(function(resolve) {
                var img = new Image();
                img.onload = function() {
                    resolve({ width: img.naturalWidth, height: img.naturalHeight });
                };
                img.onerror = function() {
                    resolve({ width: 200, height: 150 }); // 默认尺寸
                };
                img.src = base64DataUrl;
            });
        }

        // 将base64 data URL转换为Uint8Array
        function base64ToUint8Array(dataUrl) {
            var base64 = dataUrl.split(',')[1];
            var binary = atob(base64);
            var bytes = new Uint8Array(binary.length);
            for (var i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes;
        }

        // 获取图片MIME类型对应的扩展名
        function getImageExt(mimeType) {
            if (mimeType.indexOf('png') !== -1) return 'png';
            if (mimeType.indexOf('jpeg') !== -1 || mimeType.indexOf('jpg') !== -1) return 'jpeg';
            if (mimeType.indexOf('gif') !== -1) return 'gif';
            if (mimeType.indexOf('bmp') !== -1) return 'bmp';
            return 'png';
        }

        // XML特殊字符转义
        function escapeXml(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');
        }

        // 列号转字母 (1->A, 2->B, ..., 26->Z, 27->AA)
        function colToLetter(col) {
            var result = '';
            while (col > 0) {
                col--;
                result = String.fromCharCode(65 + (col % 26)) + result;
                col = Math.floor(col / 26);
            }
            return result;
        }

        async function exportExcel() {
            showToast('正在生成 Excel，请稍候...');
            
            try {
                var now = new Date();
                var templateRows = TEMPLATE_ROWS['combined'];
                var merges = TEMPLATE_MERGES;

                // 填充模板行的device和area上下文（合并单元格留空的值）
                fillTemplateContext(templateRows);

                // 构建所有行的数据
                var allRows = [];

                // 行0: 标题
                allRows.push(['转底炉耐材点检记录表', '', '', '', '', '', '', '']);
                // 行1: 日期行
                allRows.push(['', '', '', '', '', '', '', now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日']);
                // 行2: 表头
                allRows.push(['序号', '点检部位', '', '', '点检项目', '最高', '平均', '异常说明']);

                // 行3~36: 数据行（34行 = 1#炉17行 + 2#炉17行）
                // 同时收集所有需要嵌入的图片信息
                var imageList = []; // { rowIndex, colIndex, base64, type, name, width, height }
                var imageIdCounter = 0;

                for (var i = 0; i < templateRows.length; i++) {
                    var tRow = templateRows[i];
                    var data = matchFormDataToTemplate(tRow);
                    var descText = buildDescText(data);
                    var imageMedia = getImageMedia(data);

                    allRows.push([
                        tRow.seq,
                        tRow.device,
                        tRow.area,
                        tRow.pos,
                        tRow.itemName,
                        data.max || '',
                        data.avg || '',
                        descText
                    ]);

                    // 收集图片信息
                    for (var j = 0; j < imageMedia.length; j++) {
                        imageList.push({
                            id: imageIdCounter++,
                            rowIndex: 3 + i,  // 数据从行3开始
                            colIndex: 7,      // 异常说明列(H列)
                            imageIndex: j,
                            totalInRow: imageMedia.length,
                            base64: imageMedia[j].base64,
                            type: imageMedia[j].type,
                            name: imageMedia[j].name,
                            width: 0,
                            height: 0
                        });
                    }
                }

                // 行37: 需协调事项
                allRows.push(['需协调事项：', '', '', '', '', '', '', '']);
                // 行38~46: 空行（需协调事项区域）
                for (var i = 0; i < 9; i++) {
                    allRows.push(['', '', '', '', '', '', '', '']);
                }
                // 行47: 备注（填入用户输入的备注内容）
                allRows.push(['备注：' + (state.remark || ''), '', '', '', '', '', '', '']);
                // 行48~56: 空行（备注区域）
                for (var i = 0; i < 9; i++) {
                    allRows.push(['', '', '', '', '', '', '', '']);
                }

                // 异步获取所有图片尺寸
                for (var k = 0; k < imageList.length; k++) {
                    var imgInfo = imageList[k];
                    if (imgInfo.base64) {
                        var size = await getImageSize(imgInfo.base64);
                        imgInfo.width = size.width;
                        imgInfo.height = size.height;
                    }
                }



                // 生成XLSX文件（传入图片信息）
                var xlsxBuffer = generateXlsx(allRows, merges, imageList);

                var blob = new Blob([xlsxBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                var fileName = '转底炉点检记录_' + now.getFullYear() + String(now.getMonth()+1).padStart(2, '0') + String(now.getDate()).padStart(2, '0') + '.xlsx';
                
                saveAs(blob, fileName);

                // 保存历史记录
                var record = {
                    timestamp: Date.now(),
                    furnaceId: 'both',
                    data: JSON.parse(JSON.stringify(state.formData))
                };
                state.history.push(record);
                if (state.history.length > 20) state.history.shift();
                saveHistory();
                
                // 清除草稿数据
                clearDraftData();
                
                showToast('Excel 导出成功！');
            } catch (error) {
                console.error('Excel导出失败:', error);
                showToast('Excel导出失败: ' + error.message);
            }
        }

        // ===== 完整的XLSX生成器（支持图片嵌入） =====
        function generateXlsx(rows, merges, imageList) {
            var zip = new XlsxCrcZip();
            var hasImages = imageList && imageList.length > 0;

            // [Content_Types].xml
            var contentTypesXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">' +
                '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>' +
                '<Default Extension="xml" ContentType="application/xml"/>';
            if (hasImages) {
                contentTypesXml += '<Default Extension="png" ContentType="image/png"/>' +
                    '<Default Extension="jpeg" ContentType="image/jpeg"/>' +
                    '<Default Extension="jpg" ContentType="image/jpeg"/>' +
                    '<Default Extension="gif" ContentType="image/gif"/>' +
                    '<Default Extension="bmp" ContentType="image/bmp"/>';
            }
            contentTypesXml += '<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>' +
                '<Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>' +
                '<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>' +
                '<Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/>';
            if (hasImages) {
                contentTypesXml += '<Override PartName="/xl/drawings/drawing1.xml" ContentType="application/vnd.openxmlformats-officedocument.drawing+xml"/>';
            }
            contentTypesXml += '</Types>';
            zip.addFile('[Content_Types].xml', contentTypesXml);

            // _rels/.rels
            zip.addFile('_rels/.rels',
                '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
                '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>' +
                '</Relationships>');

            // xl/_rels/workbook.xml.rels
            zip.addFile('xl/_rels/workbook.xml.rels',
                '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
                '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>' +
                '<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>' +
                '<Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/>' +
                '</Relationships>');

            // xl/workbook.xml
            zip.addFile('xl/workbook.xml',
                '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                '<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">' +
                '<sheets><sheet name="Sheet1" sheetId="1" r:id="rId1"/></sheets>' +
                '</workbook>');

            // xl/styles.xml
            zip.addFile('xl/styles.xml',
                '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                '<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">' +
                '<fonts count="4">' +
                '<font><sz val="10"/><name val="宋体"/></font>' +
                '<font><b/><sz val="16"/><name val="宋体"/></font>' +
                '<font><sz val="12"/><name val="宋体"/></font>' +
                '<font><b/><sz val="10"/><name val="宋体"/></font>' +
                '</fonts>' +
                '<fills count="2"><fill><patternFill patternType="none"/></fill><fill><patternFill patternType="gray125"/></fill></fills>' +
                '<borders count="2">' +
                '<border><left/><right/><top/><bottom/><diagonal/></border>' +
                '<border><left style="thin"><color auto="1"/></left><right style="thin"><color auto="1"/></right><top style="thin"><color auto="1"/></top><bottom style="thin"><color auto="1"/></bottom><diagonal/></border>' +
                '</borders>' +
                '<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>' +
                '<cellXfs count="7">' +
                '<xf numFmtId="0" fontId="0" fillId="0" borderId="1" xfId="0"><alignment horizontal="center" vertical="center" wrapText="1"/></xf>' +
                '<xf numFmtId="0" fontId="1" fillId="0" borderId="1" xfId="0"><alignment horizontal="center" vertical="center" wrapText="1"/></xf>' +
                '<xf numFmtId="0" fontId="2" fillId="0" borderId="1" xfId="0"><alignment horizontal="right" vertical="center"/></xf>' +
                '<xf numFmtId="0" fontId="3" fillId="0" borderId="1" xfId="0"><alignment horizontal="center" vertical="center" wrapText="1"/></xf>' +
                '<xf numFmtId="0" fontId="0" fillId="0" borderId="1" xfId="0"><alignment horizontal="center" vertical="center" wrapText="1"/></xf>' +
                '<xf numFmtId="0" fontId="0" fillId="0" borderId="1" xfId="0"><alignment horizontal="center" vertical="center"/></xf>' +
                '<xf numFmtId="0" fontId="0" fillId="0" borderId="1" xfId="0"><alignment horizontal="left" vertical="top" wrapText="1"/></xf>' +
                '</cellXfs>' +
                '<cellStyles count="1"><cellStyle name="Normal" xfId="0" builtinId="0"/></cellStyles>' +
                '</styleSheet>');

            // 构建sharedStrings和sheet1.xml
            var sharedStrings = [];
            var sharedStringsMap = {};

            function getSharedStringIndex(str) {
                var escaped = escapeXml(str);
                if (sharedStringsMap.hasOwnProperty(escaped)) {
                    return sharedStringsMap[escaped];
                }
                sharedStringsMap[escaped] = sharedStrings.length;
                sharedStrings.push(escaped);
                return sharedStrings.length - 1;
            }

            // 列宽定义 (与模板一致)
            var colWidths = [1331, 2636, 2636, 3046, 6502, 1971, 1971, 5760];

            // 行高定义 - 需要根据图片数量动态调整
            var rowHeights = {};
            rowHeights[0] = 480;  // 标题行
            rowHeights[1] = 420;  // 日期行
            rowHeights[2] = 500;  // 表头行
            for (var i = 3; i <= 36; i++) {
                rowHeights[i] = 530; // 数据行默认（1#+2#共34行）
            }

            // 计算有图片的行需要的行高
            var IMAGE_MAX_HEIGHT_PT = 120;
            var IMAGE_GAP_PT = 5;
            var TEXT_HEIGHT_PT = 30;

            if (hasImages) {
                var imagesByRow = {};
                for (var k = 0; k < imageList.length; k++) {
                    var img = imageList[k];
                    if (!imagesByRow[img.rowIndex]) imagesByRow[img.rowIndex] = [];
                    imagesByRow[img.rowIndex].push(img);
                }
                for (var rowIdx in imagesByRow) {
                    var rowImages = imagesByRow[rowIdx];
                    var totalImageHeight = 0;
                    for (var m = 0; m < rowImages.length; m++) {
                        var imgH = rowImages[m].height;
                        var imgW = rowImages[m].width;
                        if (imgW > 0 && imgH > 0) {
                            var maxWidthPx = 200;
                            var maxHeightPx = IMAGE_MAX_HEIGHT_PT * 96 / 72;
                            var scale = 1;
                            if (imgW > maxWidthPx) scale = maxWidthPx / imgW;
                            if (imgH * scale > maxHeightPx) scale = maxHeightPx / imgH;
                            totalImageHeight += imgH * scale * 72 / 96;
                        } else {
                            totalImageHeight += IMAGE_MAX_HEIGHT_PT;
                        }
                        if (m < rowImages.length - 1) totalImageHeight += IMAGE_GAP_PT;
                    }
                    var neededHeight = TEXT_HEIGHT_PT + totalImageHeight;
                    var defaultHeight = 530 / 20;
                    if (neededHeight > defaultHeight) {
                        rowHeights[parseInt(rowIdx)] = Math.round(neededHeight * 20);
                    }
                }
            }

            // 构建sheet1.xml
            var sheetXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                '<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">';

            // 列宽
            sheetXml += '<cols>';
            for (var c = 0; c < 8; c++) {
                sheetXml += '<col min="' + (c+1) + '" max="' + (c+1) + '" width="' + (colWidths[c] / 256 * 4).toFixed(2) + '" customWidth="1"/>';
            }
            sheetXml += '</cols>';

            // SheetData
            sheetXml += '<sheetData>';

            for (var r = 0; r < rows.length; r++) {
                var rowData = rows[r];
                var rowHeight = rowHeights[r] ? ' ht="' + (rowHeights[r] / 20).toFixed(1) + '" customHeight="1"' : '';
                sheetXml += '<row r="' + (r + 1) + '"' + rowHeight + '>';

                for (var c = 0; c < 8; c++) {
                    var cellValue = (c < rowData.length) ? rowData[c] : '';
                    var cellRef = colToLetter(c + 1) + (r + 1);
                    var styleId = 0;

                    if (r === 0) {
                        styleId = 1;
                    } else if (r === 1) {
                        styleId = (c === 7) ? 2 : 0;
                    } else if (r === 2) {
                        styleId = 3;
                    } else if (r >= 3 && r <= 36) {
                        if (c === 0) styleId = 5;
                        else if (c === 5 || c === 6) styleId = 5;
                        else if (c === 7) styleId = 6;
                        else styleId = 4;
                    } else if (r === 37 || r === 47) {
                        styleId = 6;
                    }

                    var isNumber = (c === 0 && r >= 3 && r <= 36) || (c === 5 && r >= 3 && r <= 36) || (c === 6 && r >= 3 && r <= 36);
                    if (isNumber && cellValue !== '' && cellValue !== null && cellValue !== undefined && !isNaN(cellValue)) {
                        sheetXml += '<c r="' + cellRef + '" s="' + styleId + '"><v>' + Number(cellValue) + '</v></c>';
                    } else if (cellValue === '' || cellValue === null || cellValue === undefined) {
                        sheetXml += '<c r="' + cellRef + '" s="' + styleId + '"/>';
                    } else {
                        var si = getSharedStringIndex(String(cellValue));
                        sheetXml += '<c r="' + cellRef + '" s="' + styleId + '" t="s"><v>' + si + '</v></c>';
                    }
                }

                sheetXml += '</row>';
            }

            sheetXml += '</sheetData>';

            // 合并单元格
            if (merges && merges.length > 0) {
                sheetXml += '<mergeCells count="' + merges.length + '">';
                for (var m = 0; m < merges.length; m++) {
                    var mg = merges[m];
                    var startRef = colToLetter(mg[2] + 1) + (mg[0] + 1);
                    var endRef = colToLetter(mg[3] + 1) + (mg[1] + 1);
                    sheetXml += '<mergeCell ref="' + startRef + ':' + endRef + '"/>';
                }
                sheetXml += '</mergeCells>';
            }

            // 如果有图片，添加drawing引用
            if (hasImages) {
                sheetXml += '<drawing r:id="rId4"/>';
            }

            sheetXml += '</worksheet>';
            zip.addFile('xl/worksheets/sheet1.xml', sheetXml);

            // ===== 图片嵌入相关文件 =====
            if (hasImages) {
                // 1. 将图片文件添加到 xl/media/
                var drawingRelsXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">';

                for (var k = 0; k < imageList.length; k++) {
                    var imgInfo = imageList[k];
                    if (!imgInfo.base64) continue;
                    var ext = getImageExt(imgInfo.type);
                    var mediaFileName = 'image' + (k + 1) + '.' + ext;
                    var imgData = base64ToUint8Array(imgInfo.base64);
                    zip.addFile('xl/media/' + mediaFileName, imgData);

                    drawingRelsXml += '<Relationship Id="rId' + (k + 1) + '" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="../media/' + mediaFileName + '"/>';
                }

                drawingRelsXml += '</Relationships>';
                zip.addFile('xl/drawings/_rels/drawing1.xml.rels', drawingRelsXml);

                // 2. 构建 drawing1.xml
                var imageMaxWidthEmu = Math.round(200 * 9525);
                var imageMaxHeightEmu = Math.round(IMAGE_MAX_HEIGHT_PT * 12700);

                var drawingXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                    '<xdr:wsDr xmlns:xdr="http://schemas.openxmlformats.org/drawingml/2006/spreadsheetDrawing" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">';

                var imagesByRow2 = {};
                for (var k = 0; k < imageList.length; k++) {
                    var img = imageList[k];
                    if (!img.base64) continue;
                    if (!imagesByRow2[img.rowIndex]) imagesByRow2[img.rowIndex] = [];
                    imagesByRow2[img.rowIndex].push(img);
                }

                var drawingId = 0;
                for (var rowIdx in imagesByRow2) {
                    var rowImages = imagesByRow2[rowIdx];
                    var currentYOffsetEmu = Math.round(TEXT_HEIGHT_PT * 12700);

                    for (var m = 0; m < rowImages.length; m++) {
                        var imgInfo = rowImages[m];
                        drawingId++;

                        var imgW = imgInfo.width || 200;
                        var imgH = imgInfo.height || 150;

                        var scale = 1;
                        if (imgW * 9525 > imageMaxWidthEmu) scale = imageMaxWidthEmu / (imgW * 9525);
                        if (imgH * 9525 * scale > imageMaxHeightEmu) scale = imageMaxHeightEmu / (imgH * 9525);

                        var finalWidthEmu = Math.round(imgW * 9525 * scale);
                        var finalHeightEmu = Math.round(imgH * 9525 * scale);

                        var row1 = parseInt(rowIdx) + 1;
                        var col1 = 8;

                        drawingXml += '<xdr:oneCellAnchor>';
                        drawingXml += '<xdr:from><xdr:col>' + (col1 - 1) + '</xdr:col><xdr:colOff>95250</xdr:colOff><xdr:row>' + (row1 - 1) + '</xdr:row><xdr:rowOff>' + currentYOffsetEmu + '</xdr:rowOff></xdr:from>';
                        drawingXml += '<xdr:ext cx="' + finalWidthEmu + '" cy="' + finalHeightEmu + '"/>';
                        drawingXml += '<xdr:pic><xdr:nvPicPr><xdr:cNvPr id="' + drawingId + '" name="Picture ' + drawingId + '"/><xdr:cNvPicPr/></xdr:nvPicPr><xdr:blipFill><a:blip r:embed="rId' + (imageList.indexOf(imgInfo) + 1) + '" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/><a:stretch><a:fillRect/></a:stretch></xdr:blipFill><xdr:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="' + finalWidthEmu + '" cy="' + finalHeightEmu + '"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></xdr:spPr></xdr:pic>';
                        drawingXml += '<xdr:clientData/>';
                        drawingXml += '</xdr:oneCellAnchor>';

                        currentYOffsetEmu += finalHeightEmu + Math.round(IMAGE_GAP_PT * 12700);
                    }
                }

                drawingXml += '</xdr:wsDr>';
                zip.addFile('xl/drawings/drawing1.xml', drawingXml);

                // 3. sheet1.xml.rels
                zip.addFile('xl/worksheets/_rels/sheet1.xml.rels',
                    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
                    '<Relationship Id="rId4" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/drawing" Target="../drawings/drawing1.xml"/>' +
                    '</Relationships>');
            }

            // xl/sharedStrings.xml
            var ssXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
                '<sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="' + sharedStrings.length + '" uniqueCount="' + sharedStrings.length + '">';
            for (var s = 0; s < sharedStrings.length; s++) {
                ssXml += '<si><t xml:space="preserve">' + sharedStrings[s] + '</t></si>';
            }
            ssXml += '</sst>';
            zip.addFile('xl/sharedStrings.xml', ssXml);

            return zip.generate();
        }

        // ===== 可工作的ZIP实现（STORE模式，带CRC32） =====
        function XlsxCrcZip() {
            this.files = [];
        }

        XlsxCrcZip.prototype.addFile = function(name, content) {
            if (typeof content === 'string') {
                var encoded = new Uint8Array([]);
                // UTF-8编码
                var utf8 = unescape(encodeURIComponent(content));
                encoded = new Uint8Array(utf8.length);
                for (var i = 0; i < utf8.length; i++) {
                    encoded[i] = utf8.charCodeAt(i);
                }
                this.files.push({ name: name, data: encoded });
            } else {
                this.files.push({ name: name, data: content });
            }
        };

        XlsxCrcZip.prototype.generate = function() {
            var localHeaders = [];
            var centralHeaders = [];
            var offset = 0;

            // CRC32表
            var crcTable = (function() {
                var table = [];
                for (var i = 0; i < 256; i++) {
                    var c = i;
                    for (var j = 0; j < 8; j++) {
                        if (c & 1) c = 0xEDB88320 ^ (c >>> 1);
                        else c = c >>> 1;
                    }
                    table.push(c);
                }
                return table;
            })();

            function crc32(data) {
                var crc = 0xFFFFFFFF;
                for (var i = 0; i < data.length; i++) {
                    crc = crcTable[(crc ^ data[i]) & 0xFF] ^ (crc >>> 8);
                }
                return (crc ^ 0xFFFFFFFF) >>> 0;
            }

            for (var f = 0; f < this.files.length; f++) {
                var file = this.files[f];
                var nameBytes = [];
                var nameStr = file.name;
                for (var i = 0; i < nameStr.length; i++) {
                    nameBytes.push(nameStr.charCodeAt(i));
                }
                var nameData = new Uint8Array(nameBytes);
                var fileData = file.data;
                var crc = crc32(fileData);
                var size = fileData.length;

                // Local file header
                var localHeader = new Uint8Array(30 + nameData.length);
                var lhView = new DataView(localHeader.buffer);
                lhView.setUint32(0, 0x04034b50, true);  // Local file header signature
                lhView.setUint16(4, 20, true);           // Version needed
                lhView.setUint16(6, 0, true);            // General purpose bit flag
                lhView.setUint16(8, 0, true);            // Compression method (STORE)
                lhView.setUint16(10, 0, true);           // File last modification time
                lhView.setUint16(12, 0, true);           // File last modification date
                lhView.setUint32(14, crc, true);         // CRC-32
                lhView.setUint32(18, size, true);        // Compressed size
                lhView.setUint32(22, size, true);        // Uncompressed size
                lhView.setUint16(26, nameData.length, true); // File name length
                lhView.setUint16(28, 0, true);           // Extra field length
                localHeader.set(nameData, 30);

                localHeaders.push(localHeader);
                localHeaders.push(fileData);

                // Central directory header
                var centralHeader = new Uint8Array(46 + nameData.length);
                var chView = new DataView(centralHeader.buffer);
                chView.setUint32(0, 0x02014b50, true);   // Central directory header signature
                chView.setUint16(4, 20, true);            // Version made by
                chView.setUint16(6, 20, true);            // Version needed
                chView.setUint16(8, 0, true);             // General purpose bit flag
                chView.setUint16(10, 0, true);            // Compression method
                chView.setUint16(12, 0, true);            // File last modification time
                chView.setUint16(14, 0, true);            // File last modification date
                chView.setUint32(16, crc, true);          // CRC-32
                chView.setUint32(20, size, true);         // Compressed size
                chView.setUint32(24, size, true);         // Uncompressed size
                chView.setUint16(28, nameData.length, true); // File name length
                chView.setUint16(30, 0, true);            // Extra field length
                chView.setUint16(32, 0, true);            // File comment length
                chView.setUint16(34, 0, true);            // Disk number start
                chView.setUint16(36, 0, true);            // Internal file attributes
                chView.setUint32(38, 0, true);            // External file attributes
                chView.setUint32(42, offset, true);       // Relative offset of local header
                centralHeader.set(nameData, 46);

                centralHeaders.push(centralHeader);
                offset += localHeader.length + fileData.length;
            }

            // Calculate total sizes
            var centralDirSize = 0;
            for (var i = 0; i < centralHeaders.length; i++) {
                centralDirSize += centralHeaders[i].length;
            }

            // End of central directory
            var endRecord = new Uint8Array(22);
            var erView = new DataView(endRecord.buffer);
            erView.setUint32(0, 0x06054b50, true);       // End of central directory signature
            erView.setUint16(4, 0, true);                 // Number of this disk
            erView.setUint16(6, 0, true);                 // Disk where central directory starts
            erView.setUint16(8, this.files.length, true); // Number of central directory records on this disk
            erView.setUint16(10, this.files.length, true);// Total number of central directory records
            erView.setUint32(12, centralDirSize, true);   // Size of central directory
            erView.setUint32(16, offset, true);           // Offset of start of central directory
            erView.setUint16(20, 0, true);                // Comment length

            // Combine all parts
            var totalSize = offset + centralDirSize + 22;
            var result = new Uint8Array(totalSize);
            var pos = 0;

            // Write local headers and file data
            for (var i = 0; i < localHeaders.length; i++) {
                result.set(localHeaders[i], pos);
                pos += localHeaders[i].length;
            }

            // Write central directory
            for (var i = 0; i < centralHeaders.length; i++) {
                result.set(centralHeaders[i], pos);
                pos += centralHeaders[i].length;
            }

            // Write end record
            result.set(endRecord, pos);

            return result;
        }

        // 初始化应用
        window.onload = init;

    </script>
    
    <!-- FileSaver库 -->
    <script>
        // FileSaver库代码
        function saveAs(blob, filename) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        globalThis.saveAs = saveAs;
    </script>

</body>
